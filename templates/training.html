{% extends "base.html" %}
{% block content %}
<h4><i class="bi bi-mortarboard"></i> Training Status — {{ emp[1] }}</h4>
<p class="text-muted">{{ emp[2] }} · {{ emp[3] }}</p>

<div class="card shadow-sm">
  <table class="table table-hover mb-0">
    <thead class="table-light">
      <tr><th>Course</th><th>Due Date</th><th>Status</th><th>Update</th></tr>
    </thead>
    <tbody>
      {% for c in courses %}
      <tr>
        <td>{{ c[2] }}</td>
        <td>{{ c[4] }}</td>
        <td>
          <span class="badge {% if c[3]=='Completed' %}bg-success{% elif c[3]=='In Progress' %}bg-info text-dark{% else %}bg-secondary{% endif %}">
            {{ c[3] }}
          </span>
        </td>
        <td>
          <form method="post" action="/training_update/{{ c[0] }}/{{ emp[0] }}" class="d-flex gap-2">
            <select class="form-select form-select-sm" name="status">
              <option {% if c[3]=='Not Started' %}selected{% endif %}>Not Started</option>
              <option {% if c[3]=='Pending' %}selected{% endif %}>Pending</option>
              <option {% if c[3]=='In Progress' %}selected{% endif %}>In Progress</option>
              <option {% if c[3]=='Completed' %}selected{% endif %}>Completed</option>
            </select>
            <button class="btn btn-sm btn-primary">Save</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="4" class="text-center text-muted">No training records.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<a href="/dashboard" class="btn btn-link mt-3">← Back to Dashboard</a>
{% endblock %}
