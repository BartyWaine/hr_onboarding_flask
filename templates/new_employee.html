{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header"><i class="bi bi-person-plus"></i> New Employee</div>
      <div class="card-body">
        <form method="post" action="/new_employee">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Department</label>
            <input class="form-control" name="department" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Position</label>
            <input class="form-control" name="position" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Start Date</label>
            <input class="form-control" name="start_date" type="date" required>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary">Add Employee</button>
            <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
